name: Bug report
description: Report a defect in Project_CEMA
title: '[bug]: <short description>'
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail that we can reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: 'When I X, Y happens instead of Z.'
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include URLs, deal IDs (with PII redacted), and exact commands.
      placeholder: |
        1. Navigate to /deals/<id>
        2. Click "Generate Form 3172"
        3. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 'P0 — production down, data loss, or compliance breach'
        - 'P1 — major feature broken, no workaround'
        - 'P2 — degraded, workaround exists'
        - 'P3 — minor / cosmetic'
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Phase, environment (dev/preview/prod), browser, OS, package versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traces
      description: Sentry link, Vercel deployment URL, request IDs. **Redact all PII.**
  - type: checkboxes
    id: compliance
    attributes:
      label: Compliance impact
      options:
        - label: This bug may impact PII handling
        - label: This bug may impact attorney-review gate
        - label: This bug may impact audit log integrity
        - label: This bug may impact TCPA compliance
