name: Stale

on:
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 08:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-message: |
            This issue has been inactive for 30 days. Will be closed in 14 days unless updated.
          close-issue-message: 'Closing as stale. Please reopen with new information if still relevant.'
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,priority-high,compliance'

          days-before-pr-stale: 5
          days-before-pr-close: 10
          stale-pr-message: |
            This PR has been inactive for 5 days. Will be closed in 10 days unless updated.
          close-pr-message: 'Closing as stale. Reopen when ready to resume.'
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,priority-high,wip'

          operations-per-run: 50
