name: Security scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1' # Weekly Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  secret-scan:
    name: Secret scan (GitGuardian)
    runs-on: ubuntu-latest
    # Soft-fail: when GITGUARDIAN_API_KEY is unset (Phase 0 M1 carry-over), the
    # action prints an error and exits non-zero. continue-on-error lets the job
    # report a warning instead of blocking the PR. Remove this once the secret
    # is provisioned per docs/runbooks/github-secrets.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: main
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  snyk:
    name: Snyk vulnerability scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.repository == 'connorbhickey/Project_CEMA'
    steps:
      - uses: actions/checkout@v6
      - uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
