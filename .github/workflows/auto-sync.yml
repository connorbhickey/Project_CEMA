name: Auto-sync branches

on:
  schedule:
    - cron: '0 7 * * 1-5' # Weekdays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    name: Rebase open PR branches onto main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch + rebase eligible branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # List open PRs not from bots, not in conflict, mergeable
          branches=$(gh pr list --state open --json headRefName,author,mergeable \
            --jq '.[] | select(.author.login != "dependabot[bot]" and .author.login != "renovate[bot]" and .mergeable == "MERGEABLE") | .headRefName')

          for br in $branches; do
            echo "::group::Sync $br"
            git fetch origin "$br"
            git checkout "$br"
            git rebase origin/main || {
              echo "Rebase conflict on $br — skipping (manual resolution needed)."
              git rebase --abort
              git checkout main
              continue
            }
            git push --force-with-lease origin "$br" || echo "Push failed for $br — skipping."
            git checkout main
            echo "::endgroup::"
          done
