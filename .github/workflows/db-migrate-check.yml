name: Database migration check

on:
  pull_request:
    paths:
      - 'packages/db/**'
      - 'packages/db/migrations/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  migration-safety:
    name: Drizzle migration safety
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: project_cema_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/project_cema_ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Pre-create Neon-specific roles in CI Postgres
        # Migration 0002_app_role.sql does `GRANT cema_app_user TO neondb_owner`,
        # which assumes the Neon-managed `neondb_owner` role exists. Vanilla
        # Postgres 16 in CI doesn't have it. Create a stand-in so the migration
        # applies cleanly. NOLOGIN matches Neon's posture (we connect via the
        # `postgres` user in CI, not as neondb_owner).
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d project_cema_ci \
            -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'neondb_owner') THEN CREATE ROLE neondb_owner NOLOGIN; END IF; END \$\$;"
      - name: Apply migrations from main
        run: |
          if git ls-tree -d origin/main packages/db/migrations 2>/dev/null | grep -q migrations; then
            git checkout origin/main -- packages/db/migrations
            pnpm db:migrate
            git checkout HEAD -- packages/db/migrations
          else
            echo "No migrations on main yet — skipping baseline migration step."
          fi
      - name: Apply new migrations
        run: pnpm db:migrate
      - name: Check for destructive operations
        run: |
          if grep -E '^\s*(DROP|TRUNCATE|ALTER\s+.*\s+DROP)' packages/db/migrations/*.sql 2>/dev/null; then
            echo "::error::Destructive migration detected. Mark as 'breaking' label and document migration steps."
            exit 1
          fi
