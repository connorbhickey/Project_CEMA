name: Bundle size

# Disabled until size-limit is configured in apps/web/package.json per the
# spec's Phase 1 performance work. The previous setup used
# andresz1/size-limit-action@v1 which forces npm internally and chokes on
# pnpm's `workspace:*` protocol. Re-enable when:
#   1. A "size-limit" field (or .size-limit.json) is added to apps/web,
#   2. We pick an action that supports pnpm workspaces (e.g., a custom job
#      running `pnpm exec size-limit --json` and posting to a PR comment).
#
# Manual trigger only for now — no automatic runs on PR.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    name: Bundle size diff (manual)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Bundle size workflow is currently disabled. See header comment."
